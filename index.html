<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Roda Interativa</title>
  <style>
    :root{
      --bg:#000;
      --ring:#2b6cff;
      --ring2:#1e3f9a;
      --text:#e9eefc;
      --muted:#9bb3ff;
      --panel:#0b0f1f;
      --shadow: rgba(0,0,0,.45);
    }

    html,body{height:100%; margin:0; background:var(--bg); color:var(--text); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;}
    .wrap{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      box-sizing:border-box;
    }
    .card{
      width:min(980px, 100%);
      display:grid;
      grid-template-columns: 1fr minmax(240px, 320px);
      gap:18px;
      align-items:center;
    }

    /* Em telas menores, o texto vai pra baixo */
    @media (max-width: 720px){
      .card{ grid-template-columns: 1fr; }
      .panel{ order:2; }
    }

    .stage{
      display:flex;
      justify-content:center;
      align-items:center;
      background: transparent;
    }

    .panel{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(155,179,255,.18);
      border-radius: 18px;
      padding:16px 16px 14px;
      box-shadow: 0 16px 40px var(--shadow);
    }
    .panel h3{
      margin:0 0 8px;
      font-size:14px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color: var(--muted);
    }
    .panel .value{
      font-size:22px;
      line-height:1.2;
      margin:0 0 10px;
      font-weight:700;
    }
    .panel .hint{
      margin:0;
      font-size:13px;
      line-height:1.4;
      color: rgba(233,238,252,.75);
    }

    /* SVG */
    svg{ width:min(520px, 100%); height:auto; display:block; }
    .seg{
      cursor:pointer;
      transition: filter .18s ease, opacity .18s ease;
    }
    .seg:hover{ filter: drop-shadow(0 0 6px rgba(43,108,255,.45)); }
    .seg.active{
      filter: drop-shadow(0 0 10px rgba(43,108,255,.7));
    }

    .ringStroke{
      fill:none;
      stroke: var(--ring);
      stroke-width: 2.2;
      opacity:.95;
    }
    .divider{
      stroke: rgba(43,108,255,.65);
      stroke-width: 2.2;
    }

    .label{
      fill: var(--text);
      font-weight: 600;
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    /* “botão” discreto pra reset */
    .reset{
      margin-top:10px;
      display:inline-flex;
      gap:8px;
      align-items:center;
      font-size:12px;
      color: rgba(233,238,252,.8);
      background: rgba(155,179,255,.08);
      border: 1px solid rgba(155,179,255,.22);
      padding:8px 10px;
      border-radius: 12px;
      cursor:pointer;
      user-select:none;
    }
    .reset:hover{ background: rgba(155,179,255,.12); }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <div class="stage">
        <svg viewBox="-260 -260 520 520" aria-label="Roda Interativa">
          <!-- contornos externos/ internos do anel -->
          <circle r="210" class="ringStroke" />
          <circle r="150" class="ringStroke" />

          <!-- Segmentos: são "caminhos" grossos (stroke) formando o anel -->
          <!-- Config: 5 segmentos iguais, com uma pequena folga (gap) -->
          <g id="segments" fill="none" stroke-linecap="butt">
            <!-- caminhos gerados no JS -->
          </g>

          <!-- rótulos -->
          <g id="labels">
            <!-- textos gerados no JS -->
          </g>
        </svg>
      </div>

      <div class="panel">
        <h3>SELECIONADO</h3>
        <p class="value" id="selectedText">Clique em um bloco</p>
        <p class="hint" id="senseText">SENTIDO —</p>

        <div class="reset" id="resetBtn" role="button" tabindex="0" aria-label="Limpar seleção">
          Limpar seleção
        </div>
      </div>
    </div>
  </div>

  <script>
    // ---- CONFIG ----
    const items = ["VARIEDADE","VERACIDADE","VELOCIDADE","VALOR","VOLUME"];

    // Geometria do anel
    const rOuter = 210;
    const rInner = 150;
    const rMid   = (rOuter + rInner) / 2;
    const strokeWidth = (rOuter - rInner);

    // Segmentação
    const n = items.length;
    const full = 360;
    const gapDeg = 2.2;                 // "respiro" entre segmentos
    const segDeg = (full / n) - gapDeg; // tamanho útil de cada segmento

    // Rotação inicial (pra ficar parecido com a imagem)
    // -90 coloca o início no topo; ajustamos um pouco pra “centralizar”
    const startRotation = -90 - (segDeg + gapDeg)/2;

    // Cores do anel (stroke)
    const strokeColor = getComputedStyle(document.documentElement).getPropertyValue('--ring').trim();

    const segGroup = document.getElementById("segments");
    const labelGroup = document.getElementById("labels");

    const selectedText = document.getElementById("selectedText");
    const senseText = document.getElementById("senseText");
    const resetBtn = document.getElementById("resetBtn");

    function polarToCartesian(r, angleDeg){
      const a = (angleDeg) * Math.PI / 180;
      return { x: r * Math.cos(a), y: r * Math.sin(a) };
    }

    // Arco SVG no formato "A"
    function arcPath(r, a0, a1){
      const p0 = polarToCartesian(r, a0);
      const p1 = polarToCartesian(r, a1);
      const largeArc = (a1 - a0) % 360 > 180 ? 1 : 0;
      return `M ${p0.x.toFixed(3)} ${p0.y.toFixed(3)} A ${r} ${r} 0 ${largeArc} 1 ${p1.x.toFixed(3)} ${p1.y.toFixed(3)}`;
    }

    function setActive(index){
      // limpa classes
      [...segGroup.querySelectorAll(".seg")].forEach((el,i)=>{
        el.classList.toggle("active", i === index);
        el.style.opacity = (i === index) ? "1" : "0.88";
      });

      const name = items[index];
      selectedText.textContent = name;
      senseText.textContent = `SENTIDO ${name}`;
    }

    function clearActive(){
      [...segGroup.querySelectorAll(".seg")].forEach((el)=>{
        el.classList.remove("active");
        el.style.opacity = "0.95";
      });
      selectedText.textContent = "Clique em um bloco";
      senseText.textContent = "SENTIDO —";
    }

    // Gera segmentos e labels
    items.forEach((name, i) => {
      const aStart = startRotation + i*(segDeg + gapDeg) + gapDeg/2;
      const aEnd   = aStart + segDeg;

      // Segmento como arco grosso
      const path = document.createElementNS("http://www.w3.org/2000/svg","path");
      path.setAttribute("d", arcPath(rMid, aStart, aEnd));
      path.setAttribute("stroke", strokeColor);
      path.setAttribute("stroke-width", strokeWidth);
      path.setAttribute("class", "seg");
      path.setAttribute("data-index", String(i));
      path.addEventListener("click", () => setActive(i));
      segGroup.appendChild(path);

      // Divisórias (linhas radiais finas)
      const divider = document.createElementNS("http://www.w3.org/2000/svg","line");
      const pA = polarToCartesian(rInner, aStart - gapDeg/2);
      const pB = polarToCartesian(rOuter, aStart - gapDeg/2);
      divider.setAttribute("x1", pA.x); divider.setAttribute("y1", pA.y);
      divider.setAttribute("x2", pB.x); divider.setAttribute("y2", pB.y);
      divider.setAttribute("class","divider");
      divider.setAttribute("opacity","0.9");
      segGroup.appendChild(divider);

      // Label (texto seguindo o centro do segmento)
      const mid = (aStart + aEnd)/2;
      const labelPos = polarToCartesian((rOuter + rInner)/2, mid);

      const text = document.createElementNS("http://www.w3.org/2000/svg","text");
      text.setAttribute("x", labelPos.x);
      text.setAttribute("y", labelPos.y);
      text.setAttribute("class","label");
      text.setAttribute("text-anchor","middle");
      text.setAttribute("dominant-baseline","middle");

      // Rotaciona o texto pra ficar alinhado ao anel
      // Se estiver “de cabeça pra baixo”, vira 180 graus
      let rot = mid + 90;
      let flip = (mid > 90 && mid < 270);
      if (flip) rot += 180;

      text.setAttribute("transform", `rotate(${rot} ${labelPos.x} ${labelPos.y})`);
      text.textContent = name;
      labelGroup.appendChild(text);
    });

    // Fecha a última divisória
    {
      const a = startRotation + n*(segDeg + gapDeg) + gapDeg/2;
      const divider = document.createElementNS("http://www.w3.org/2000/svg","line");
      const pA = polarToCartesian(rInner, a - gapDeg/2);
      const pB = polarToCartesian(rOuter, a - gapDeg/2);
      divider.setAttribute("x1", pA.x); divider.setAttribute("y1", pA.y);
      divider.setAttribute("x2", pB.x); divider.setAttribute("y2", pB.y);
      divider.setAttribute("class","divider");
      divider.setAttribute("opacity","0.9");
      segGroup.appendChild(divider);
    }

    // Reset
    resetBtn.addEventListener("click", clearActive);
    resetBtn.addEventListener("keydown", (e)=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); clearActive(); } });

    // Começa sem seleção
    clearActive();
  </script>
</body>
</html>
